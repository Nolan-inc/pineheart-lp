<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パインバター LP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background-image: url('back/lp_background01.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }
  .lp-container {
    width: 100%;
    max-width: 390px;
    background: #fff;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  }
  .lp-container > img {
    width: 100%;
    height: auto;
    display: block;
  }
  .festival-section {
    background: #FFF8E1;
  }
  .festival-text {
    text-align: center;
    padding: 24px 16px;
  }
  .festival-text p.sub {
    font-size: 13px;
    letter-spacing: 0.05em;
    color: #333;
  }
  .festival-text h3 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.05em;
    line-height: 1.3;
    color: #333;
    margin-top: 4px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }
  .festival-text h3 .highlight {
    color: #E49B0F;
    font-size: 28px;
  }
  .festival-text h3 .highlight-sm {
    color: #E49B0F;
  }
  .festival-text p.note {
    font-size: 10px;
    color: #333;
    margin-top: 16px;
  }
  .festival-video {
    padding: 0 20px 40px;
  }
  .festival-video-inner {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
  }
  .festival-video video {
    width: 100%;
    height: auto;
    display: block;
    margin-top: -5%;
    margin-bottom: -18%;
  }
  .developer-section {
    background: #041D12;
    padding: 48px 16px;
    font-family: 'Shippori Mincho', serif;
  }
  .developer-inner {
    max-width: 768px;
    margin: 0 auto;
    text-align: center;
  }
  .logo-decoration {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .logo-decoration .line {
    display: block;
    width: 32px;
    height: 0.5px;
    background: rgba(255,213,79,0.8);
  }
  .logo-decoration img {
    width: 20px;
    height: 20px;
    filter: brightness(0) invert(1) sepia(1) saturate(10) hue-rotate(15deg);
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .title-row .line {
    display: block;
    width: 48px;
    height: 2px;
    background: #FFD54F;
  }
  .title-row h2 {
    font-size: 36px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .title-row h2 span {
    color: #FFD54F;
  }
  .developer-subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.05em;
    line-height: 1.625;
  }
  .developer-subtitle span {
    color: #FFD54F;
    font-weight: bold;
  }
  .video-wrapper {
    margin-top: 24px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
  }
  .video-wrapper video {
    width: 100%;
    height: auto;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">
</head>
<body>
<div class="lp-container">

  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image01.png" alt="パインバター">

  <!-- 代々木フェス動画セクション -->
  <div class="festival-section">
    <div class="festival-text">
      <p class="sub">２日間で来場者数25万人越え</p>
      <h3>代々木フェスでも<span class="highlight">大反響</span><span class="highlight-sm">！</span></h3>
      <p class="note">※個人の感想であり、効果を保証するものではありません</p>
    </div>
    <div class="festival-video">
      <div class="festival-video-inner">
        <video autoplay loop muted playsinline>
          <source src="product/smoothie/smoothie-LP2/smoothie-LP2_movie01.MP4" type="video/mp4">
        </video>
      </div>
    </div>
  </div>

  <!-- 開発者インタビュー動画セクション -->
  <div class="developer-section">
    <div class="developer-inner">
      <div class="logo-decoration">
        <span class="line"></span>
        <img src="logo/logo_image01.png" alt="パインハート">
        <span class="line"></span>
      </div>
      <div class="title-row">
        <span class="line"></span>
        <h2>パインハート <span>商品開発者</span></h2>
        <span class="line"></span>
      </div>
      <p class="developer-subtitle">
        <span>30年</span>の食品開発で培った経験。<span>開発者</span>が語る、商品開発の裏側。
      </p>
      <div class="video-wrapper">
        <video src="product/pain-butter/pain-butter-lp2/pine butter-video01.mp4" autoplay loop muted controls playsinline preload="metadata"></video>
      </div>
    </div>
  </div>

  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image02-1.png" alt="パインバター 紹介">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image03.png" alt="パインバター こだわり">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image04.png" alt="パインバター 素材">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image05.png" alt="パインバター 製法">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image06.png" alt="パインバター 栄養">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image07-1.png" alt="パインバター 楽しみ方">
  <img src="product/gold-barrel/gold-barrel_LP2/gold-barrel_lp2_image13.png" alt="ゴールドバレル特典">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image13-1.png" alt="パインバター紹介">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image08-2.jpg" alt="パインバター お客様の声">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image09.png" alt="パインバター 価格">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image10.png" alt="パインバター セット">
  <img src="product/pain-butter/pain-butter-lp2/pine butter-lp2_image11.png" alt="パインバター クロージング">

</div>
</body>
</html>

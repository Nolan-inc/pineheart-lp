<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パインに夢中 LP</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    background-image: url('back/lp_background.png');
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    background-repeat: no-repeat;
    font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  }
  .lp-container {
    width: 100%;
    max-width: 480px;
    background: #fff;
    box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
  }
  .lp-container img {
    width: 100%;
    height: auto;
    display: block;
  }
  .developer-section {
    background: #041D12;
    padding: 48px 16px;
    font-family: 'Shippori Mincho', serif;
  }
  .developer-inner {
    max-width: 768px;
    margin: 0 auto;
    text-align: center;
  }
  .logo-decoration {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .logo-decoration .line {
    display: block;
    width: 32px;
    height: 0.5px;
    background: rgba(255,213,79,0.8);
  }
  .logo-decoration img {
    width: 20px;
    height: 20px;
    filter: brightness(0) invert(1) sepia(1) saturate(10) hue-rotate(15deg);
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .title-row .line {
    display: block;
    width: 48px;
    height: 2px;
    background: #FFD54F;
  }
  .title-row h2 {
    font-size: 36px;
    font-weight: bold;
    color: #fff;
    letter-spacing: 0.05em;
  }
  .title-row h2 span {
    color: #FFD54F;
  }
  .developer-subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.05em;
    line-height: 1.625;
  }
  .developer-subtitle span {
    color: #FFD54F;
    font-weight: bold;
  }
  .video-wrapper {
    margin-top: 24px;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
  }
  .video-wrapper video {
    width: 100%;
    height: auto;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="lp-container">

  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image01-4.jpg" alt="パインに夢中">

  <!-- 開発者インタビュー動画セクション -->
  <div class="developer-section">
    <div class="developer-inner">
      <div class="logo-decoration">
        <span class="line"></span>
        <img src="logo/logo_image01.png" alt="パインハート">
        <span class="line"></span>
      </div>
      <div class="title-row">
        <span class="line"></span>
        <h2>パインハート <span>商品開発者</span></h2>
        <span class="line"></span>
      </div>
      <p class="developer-subtitle">
        <span>30年</span>の食品開発で培った経験。<span>開発者</span>が語る、商品開発の裏側。
      </p>
      <div class="video-wrapper">
        <video src="product/smoothie/smoothie-LP2/smoothie-LP2_movie02.mp4" autoplay loop muted controls playsinline preload="metadata"></video>
      </div>
    </div>
  </div>

  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image14-3.png" alt="パインに夢中 紹介">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image02-2.png" alt="パインに夢中 特徴">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image03.png" alt="パインに夢中 こだわり">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image18.png" alt="パインに夢中 こだわり詳細">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image04.png" alt="パインに夢中 素材">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image05.png" alt="パインに夢中 製法">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image13.png" alt="パインに夢中 楽しみ方">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image16.png" alt="パインに夢中 追加">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image08.png" alt="パインに夢中 お客様の声">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image15-1.png" alt="パインに夢中 追加情報">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image10-6.jpg" alt="パインに夢中 定期便詳細">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image11.png" alt="パインに夢中 セット">
  <img src="product/smoothie/smoothie-LP2/smoothie-LP2_image12-06.png" alt="パインに夢中 クロージング">

</div>
</body>
</html>
